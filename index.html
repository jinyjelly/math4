<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곱셈공식 4 챌린지</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #e3f2fd; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #MUL_GAME { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #ffffff; padding: 20px; border-radius: 20px; border: 4px solid #2196f3; width: 100%; max-width: 400px; box-sizing: border-box; min-height: 600px; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .scr { display: none; }
        .scr.on { display: block; }
        #t-bar-box { width: 100%; height: 12px; background: #bbdefb; border-radius: 6px; margin-bottom: 15px; overflow: hidden; border: 1px solid #1976d2; }
        #t-bar-inner { width: 100%; height: 100%; background: linear-gradient(90deg, #64b5f6, #2196f3); transition: width 0.1s linear; }
        .st-bar { display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 15px; color: #0d47a1; font-size: 1.1rem; }
        .pr { font-size: 2.2rem; font-weight: bold; margin: 30px 0; min-height: 100px; display: flex; align-items: center; justify-content: center; color: #333; line-height: 1.4; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { font-size: 1.05rem; padding: 15px 5px; background: #fff; border: 2px solid #2196f3; border-radius: 12px; cursor: pointer; font-weight: bold; color: #1976d2; transition: 0.2s; word-break: keep-all; }
        #fb-msg { margin-top:20px; font-weight:bold; min-height: 4.5em; font-size: 1.2rem; line-height: 1.6; display: flex; align-items: center; justify-content: center; border: 2px dashed #2196f3; border-radius: 10px; background: #f0f7ff; padding: 10px; }
        .start-btn { font-size: 1.8rem; padding: 15px 40px; background: #2196f3; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 50px; }
        .re-btn { font-size: 1.2rem; padding: 15px; background: #1976d2; color: white; border: none; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>
<div id="MUL_GAME">
    <audio id="bgm" loop preload="auto" src="bgm.mp3"></audio>

    <div id="S_START" class="scr on">
        <h2 style="color:#1565c0; margin-top: 40px;">🧪 곱셈공식 4 챌린지</h2>
        <p style="color:gray; line-height:1.6;">복잡한 공식도 차근차근 전개하세요!<br><span style="color:#d32f2f; font-weight:bold;">※ 오답 시 점수가 감점됩니다.</span></p>
        <button id="GO_BTN" class="start-btn">시작하기!</button>
    </div>

    <div id="S_QUIZ" class="scr">
        <div id="t-bar-box"><div id="t-bar-inner"></div></div>
        <div class="st-bar">
            <div>점수: <span id="SCORE_VAL">0</span></div>
            <div>시간: <span id="TIME_VAL">60</span>초</div>
        </div>
        <div id="P_TXT" class="pr"></div>
        <div id="O_BOX" class="btn-grid"></div>
        <div id="fb-msg">계산 실수에 주의하세요!</div>
    </div>

    <div id="S_RES" class="scr">
        <h2 style="color:#1565c0;">🏁 결과 확인</h2>
        <p style="font-size: 2rem; margin: 10px 0;">최종 점수: <span id="FINAL_SCORE" style="color:red;">0</span>점</p>
        <button id="RE_BTN" class="re-btn">다시 도전하기</button>
    </div>
</div>

<script>
(function() {
    var ans = "", score = 0, timeLeft = 60, timer = null, isPaused = false;
    const bgm = document.getElementById('bgm');

    // 곱셈공식 4번 데이터 (문자 x 통일)
    const formulas = [
        { q: "(2x + 1)(x + 3)", a: "2x² + 7x + 3" },
        { q: "(3x + 2)(x + 1)", a: "3x² + 5x + 2" },
        { q: "(x + 2)(2x + 5)", a: "2x² + 9x + 10" },
        { q: "(2x - 1)(x + 4)", a: "2x² + 7x - 4" },
        { q: "(3x - 2)(2x + 1)", a: "6x² - x - 2" },
        { q: "(2x + 3)(3x - 2)", a: "6x² + 5x - 6" },
        { q: "(5x + 1)(x - 2)", a: "5x² - 9x - 2" },
        { q: "(2x - 3)(x - 1)", a: "2x² - 5x + 3" },
        { q: "(3x - 1)(2x - 3)", a: "6x² - 11x + 3" },
        { q: "(4x + 3)(x + 2)", a: "4x² + 11x + 6" },
        { q: "(x - 4)(3x + 2)", a: "3x² - 10x - 8" },
        { q: "(2x - 5)(2x - 1)", a: "4x² - 12x + 5" }
    ];

    function init() {
        document.getElementById('S_START').classList.remove('on');
        document.getElementById('S_RES').classList.remove('on');
        document.getElementById('S_QUIZ').classList.add('on');
        score = 0; timeLeft = 60; isPaused = false;
        bgm.volume = 0.3;
        bgm.play().catch(e => {});
        updateUI();
        make();
        if(timer) clearInterval(timer);
        timer = setInterval(function() {
            if(!isPaused) {
                timeLeft--;
                updateUI();
                if(timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function updateUI() {
        document.getElementById('SCORE_VAL').innerText = score;
        document.getElementById('TIME_VAL').innerText = timeLeft;
        document.getElementById('t-bar-inner').style.width = (timeLeft / 60 * 100) + "%";
    }

    function make() {
        isPaused = false;
        document.getElementById('fb-msg').innerHTML = "알맞은 전개식을 고르세요!";
        document.getElementById('fb-msg').style.backgroundColor = "#f0f7ff";
        
        const item = formulas[Math.floor(Math.random() * formulas.length)];
        document.getElementById('P_TXT').innerHTML = item.q;
        ans = item.a;
        
        let os = [ans];
        while(os.length < 4) {
            let w = formulas[Math.floor(Math.random() * formulas.length)].a;
            if(os.indexOf(w) === -1) os.push(w);
        }
        os.sort(() => Math.random() - 0.5);

        const box = document.getElementById('O_BOX'); box.innerHTML = "";
        os.forEach(v => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn'; btn.innerText = v;
            btn.onclick = () => { if(!isPaused) check(v); };
            box.appendChild(btn);
        });
    }

    function check(v) {
        const fb = document.getElementById('fb-msg');
        if(v === ans) {
            isPaused = true; 
            score += 100;
            fb.innerHTML = "<span style='color:blue;'>정답! +100 ✨</span>";
            fb.style.backgroundColor = "#e8f5e9";
            setTimeout(() => { make(); }, 800); 
        } else {
            score = Math.max(0, score - 100);
            fb.innerHTML = "<span style='color:red;'>오답! -100점 💀<br>정답: " + ans + "</span>";
            fb.style.backgroundColor = "#ffebee";
            
            const btns = document.querySelectorAll('.opt-btn');
            btns.forEach(b => b.style.opacity = "0.5");
            
            setTimeout(() => { make(); }, 2000); 
        }
        updateUI();
    }

    function endGame() {
        clearInterval(timer);
        bgm.pause();
        document.getElementById('S_QUIZ').classList.remove('on');
        document.getElementById('S_RES').classList.add('on');
        document.getElementById('FINAL_SCORE').innerText = score;
    }

    document.getElementById('GO_BTN').onclick = init;
    document.getElementById('RE_BTN').onclick = init;
})();
</script>
</body>
</html>
