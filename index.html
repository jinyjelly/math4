<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곱셈공식(4) 챌린지</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #fdf2f2; display: flex; justify-content: center; font-family: sans-serif; }
        #X_CHALLENGE { text-align: center; background-color: #fff5f5; padding: 20px; border-radius: 20px; border: 4px solid #f44336; width: 100%; max-width: 380px; box-sizing: border-box; min-height: 520px; position: relative; }
        .scr { display: none; } .scr.on { display: block; }
        #t-bar-box { width: 100%; height: 12px; background: #ffcdd2; border-radius: 6px; margin-bottom: 15px; overflow: hidden; }
        #t-bar-inner { width: 100%; height: 100%; background: #f44336; transition: width 0.1s linear; }
        .st-bar { display: flex; justify-content: space-around; font-weight: bold; color: #b71c1c; margin-bottom: 10px; }
        .pr { font-size: 1.5rem; font-weight: bold; margin: 30px 0; min-height: 60px; color: #333; display: flex; align-items: center; justify-content: center; }
        .opt-btn { font-size: 1rem; width: 100%; padding: 12px; background: #fff; border: 2px solid #f44336; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 8px; color: #d32f2f; }
        #fb-msg { margin-top:15px; font-weight:bold; min-height: 3.5em; color: #b71c1c; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.4; }
        .start-btn { font-size: 1.8rem; padding: 15px 40px; background: #f44336; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 50px; }
    </style>
</head>
<body>
<div id="X_CHALLENGE">
    <audio id="myBgm" loop src="bgm.mp3" preload="none"></audio>

    <div id="S_START" class="scr on">
        <h2 style="color:#d32f2f;">📐 곱셈공식(4)<br>최종 챌린지 🔥</h2>
        <p style="color:gray;">(ax+b)(cx+d) 마스터!<br>버튼을 누르면 즉시 시작됩니다.</p>
        <button class="start-btn" onclick="startGameNow()">시작하기</button>
    </div>

    <div id="S_QUIZ" class="scr">
        <div id="t-bar-box"><div id="t-bar-inner"></div></div>
        <div class="st-bar">
            <div>점수: <span id="SCORE_VAL">0</span></div>
            <div>시간: <span id="TIME_VAL">60</span>초</div>
        </div>
        <div id="P_TXT" class="pr"></div>
        <div id="O_BOX"></div>
        <div id="fb-msg"></div>
    </div>

    <div id="S_RES" class="scr">
        <h2 style="color:#d32f2f;">🏁 미션 완료!</h2>
        <p style="font-size: 1.8rem; margin: 10px 0;">최종 점수: <span id="FINAL_SCORE" style="color:#f44336;">0</span>점</p>
        <button onclick="location.reload()" class="opt-btn" style="background:#f44336; color:white; margin-top:20px;">다시 도전하기</button>
    </div>
</div>

<script>
    var ans = "", score = 0, timeLeft = 60, timer = null, isPaused = false;

    function startGameNow() {
        document.getElementById('S_START').classList.remove('on');
        document.getElementById('S_QUIZ').classList.add('on');
        try {
            var bgm = document.getElementById('myBgm');
            bgm.play().catch(e => console.log("음악 대기 중"));
        } catch(e) {}
        startTimer();
        make();
    }

    function startTimer() {
        if(timer) clearInterval(timer);
        timer = setInterval(function() {
            if(!isPaused) {
                timeLeft--;
                document.getElementById('TIME_VAL').innerText = timeLeft;
                document.getElementById('t-bar-inner').style.width = (timeLeft/60)*100 + "%";
                if(timeLeft <= 0) endGame();
            }
        }, 1000);
    }

    function fmt(a, b, c) {
        let s = (a === 1) ? "x²" : (a === -1) ? "-x²" : a + "x²";
        if (b > 0) s += " + " + (b === 1 ? "" : b) + "x";
        else if (b < 0) s += " - " + (Math.abs(b) === 1 ? "" : Math.abs(b)) + "x";
        if (c > 0) s += " + " + c;
        else if (c < 0) s += " - " + Math.abs(c);
        return s;
    }

    function make() {
        isPaused = false;
        document.getElementById('fb-msg').innerHTML = "";
        
        // 계수 생성 (a, c는 2~5, b, d는 -5~5)
        let a = Math.floor(Math.random() * 4) + 2;
        let c = Math.floor(Math.random() * 3) + 2;
        let b = 0; while(b === 0) b = Math.floor(Math.random() * 11) - 5;
        let d = 0; while(d === 0 || d === b) d = Math.floor(Math.random() * 11) - 5;

        let problemText = "(" + a + "x " + (b > 0 ? "+ " + b : "- " + Math.abs(b)) + ")(" + c + "x " + (d > 0 ? "+ " + d : "- " + Math.abs(d)) + ")";
        ans = fmt(a*c, (a*d + b*c), b*d);

        // 오답 생성 로직
        let w1 = fmt(a*c, (a*d - b*c), b*d); // 가운데 부호 실수
        let w2 = fmt(a*c, (a*b + c*d), b*d); // 엉뚱한 조합
        let w3 = (a*c) + "x² " + (b*d > 0 ? "+ " : "- ") + Math.abs(b*d); // 일차항 실종

        document.getElementById('P_TXT').innerText = problemText;
        let os = [ans, w1, w2, w3].sort(() => 0.5 - Math.random());
        let box = document.getElementById('O_BOX'); box.innerHTML = "";
        os.forEach(v => {
            let btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = v;
            btn.onclick = () => { if(!isPaused) check(v); };
            box.appendChild(btn);
        });
    }

    function check(v) {
        let fb = document.getElementById('fb-msg');
        if(v === ans) {
            score += 100;
            document.getElementById('SCORE_VAL').innerText = score;
            fb.innerHTML = "<span style='color:blue;'>정답! +100 ✨</span>";
            setTimeout(make, 300);
        } else {
            isPaused = true; 
            fb.innerHTML = "<span style='color:red;'>오답! 🧐 정답:</span><br>" + ans;
            setTimeout(make, 2500); // 4번은 복잡하니 정답을 조금 더 길게 보여줌
        }
    }

    function endGame() {
        clearInterval(timer);
        try { document.getElementById('myBgm').pause(); } catch(e) {}
        document.getElementById('S_QUIZ').classList.remove('on');
        document.getElementById('S_RES').classList.add('on');
        document.getElementById('FINAL_SCORE').innerText = score;
    }
</script>
</body>
</html>
